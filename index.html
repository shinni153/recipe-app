<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피 추출기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 9px 22px; border-radius: 8px; border: 1.5px solid #ddd; background: #fff; color: #888; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .card { background: #fff; border-radius: 14px; padding: 1.25rem; border: 1px solid #e8e8e8; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    input[type="text"] { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
    input[type="text"]:focus { border-color: #1a73e8; }
    select { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: #fff; cursor: pointer; }
    button.primary { width: 100%; padding: 13px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
    button.primary:hover { background: #1557b0; }
    button.primary:disabled { background: #aaa; cursor: not-allowed; }
    button.save-btn { width: 100%; padding: 12px; background: #34a853; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
    button.save-btn:hover { background: #2d8f47; }
    button.save-btn:disabled { background: #aaa; cursor: not-allowed; }
    .section-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #555; }
    .error { background: #fdecea; color: #c62828; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 12px; }
    .success { background: #e8f5e9; color: #2e7d32; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 12px; }
    .method-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
    .method-gemini { background: #e8f5e9; color: #2e7d32; }
    .method-transcript { background: #e8f0fe; color: #1a73e8; }
    .preview-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
    .loading-box { background: #fff; border-radius: 14px; padding: 2rem; text-align: center; border: 1px solid #e8e8e8; margin-top: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .loading-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .loading-steps { list-style: none; text-align: left; display: inline-block; }
    .loading-step { display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 8px 0; color: #aaa; }
    .loading-step.done { color: #1a73e8; font-weight: 500; }
    .loading-step.active { color: #333; font-weight: 600; }
    .step-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #eee; color: #aaa; flex-shrink: 0; }
    .step-icon.done { background: #1a73e8; color: #fff; }
    .step-icon.active { background: #fff; border: 2px solid #1a73e8; }
    .recipe-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .recipe-tab { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #888; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .recipe-tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .recipe-card { background: #fff; border-radius: 14px; padding: 1.5rem; border: 1px solid #e8e8e8; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .recipe-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .recipe-desc { font-size: 14px; color: #888; margin-bottom: 20px; line-height: 1.5; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .meta-item { background: #f7f8fa; border-radius: 10px; padding: 12px 16px; }
    .meta-label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .meta-value { font-size: 16px; font-weight: 600; }
    .nutrition-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .nutrition-item { background: #f0f7ff; border-radius: 10px; padding: 10px 8px; text-align: center; }
    .nutrition-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .nutrition-value { font-size: 14px; font-weight: 600; color: #1a73e8; }
    .ingredient-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .ingredient-amount { color: #888; }
    .step-row { display: flex; gap: 12px; font-size: 14px; margin-bottom: 12px; align-items: flex-start; }
    .step-num { min-width: 28px; height: 28px; border-radius: 50%; background: #e8f0fe; color: #1a73e8; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .step-text { line-height: 1.7; padding-top: 4px; }
    .divider { height: 1px; background: #f0f0f0; margin: 20px 0; }
    /* 저장된 레시피 */
    .saved-recipe-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
    .saved-recipe-item:hover { background: #f9f9f9; border-radius: 8px; padding: 12px 8px; }
    .saved-recipe-title { font-size: 15px; font-weight: 600; }
    .saved-recipe-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .category-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #e8f0fe; color: #1a73e8; margin-right: 6px; }
    .delete-btn { padding: 4px 10px; background: #fdecea; color: #c62828; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .category-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .cat-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #888; cursor: pointer; font-size: 13px; font-weight: 500; }
    .cat-btn.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>🍳 레시피 추출기</h1>
  <p class="subtitle">유튜브 영상이나 음식 사진에서 레시피를 자동으로 추출해요</p>

  <div class="tabs">
    <button class="tab active" onclick="switchMainTab('extract')">레시피 추출</button>
    <button class="tab" onclick="switchMainTab('saved')">저장된 레시피</button>
  </div>

  <!-- 추출 탭 -->
  <div id="main-extract">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('youtube')">유튜브 / 쇼츠</button>
      <button class="tab" onclick="switchTab('image')">음식 사진</button>
    </div>

    <div id="tab-youtube" class="card">
      <p class="section-title">유튜브 URL 입력</p>
      <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." />
      <button class="primary" onclick="extractYoutube()">레시피 추출하기</button>
    </div>

    <div id="tab-image" class="card hidden">
      <p class="section-title">음식 사진 업로드</p>
      <img id="preview" class="preview-img hidden" />
      <input type="file" accept="image/*" onchange="handleImage(event)" style="margin-bottom:10px" />
      <button class="primary" onclick="extractImage()">레시피 분석하기</button>
    </div>

    <div id="error" class="error hidden"></div>
    <div id="save-success" class="success hidden"></div>

    <div id="loading-box" class="loading-box hidden">
    <div class="loading-title">레시피를 가져오는 중</div>
    <p style="font-size:13px;color:#888;margin-bottom:16px">영상 길이에 따라 1~5분 정도 소요될 수 있어요 ☕</p>
      <ul class="loading-steps">
        <li class="loading-step" id="ls1"><div class="step-icon" id="li1">1</div>준비 중입니다</li>
        <li class="loading-step" id="ls2"><div class="step-icon" id="li2">2</div>영상을 분석하는 중</li>
        <li class="loading-step" id="ls3"><div class="step-icon" id="li3">3</div>재료 정리 중</li>
        <li class="loading-step" id="ls4"><div class="step-icon" id="li4">4</div>단계를 확인하는 중</li>
        <li class="loading-step" id="ls5"><div class="step-icon" id="li5">5</div>거의 다 됐습니다 (조금만 더 기다려주세요!)</li>
      </ul>
    </div>

    <div id="result-section" class="hidden" style="margin-top:16px">
      <div id="method-badge"></div>
      <div id="recipe-tabs" class="recipe-tabs"></div>
      <div id="result"></div>

      <!-- 저장 UI -->
      <div class="card" style="margin-top:16px" id="save-section">
        <p class="section-title">레시피 저장하기</p>
        <select id="category-select" style="margin-bottom:10px">
          <option value="한식">🍚 한식</option>
          <option value="양식">🍝 양식</option>
          <option value="일식">🍣 일식</option>
          <option value="중식">🥢 중식</option>
          <option value="디저트">🍰 디저트</option>
          <option value="베이킹">🍞 베이킹</option>
          <option value="음료">☕ 음료</option>
          <option value="기타">📌 기타</option>
        </select>
        <button class="save-btn" onclick="saveRecipe()">💾 저장하기</button>
      </div>
    </div>
  </div>

  <!-- 저장된 레시피 탭 -->
  <div id="main-saved" class="hidden">
    <div class="category-filter" id="category-filter">
      <button class="cat-btn active" onclick="filterCategory('전체')">전체</button>
      <button class="cat-btn" onclick="filterCategory('한식')">🍚 한식</button>
      <button class="cat-btn" onclick="filterCategory('양식')">🍝 양식</button>
      <button class="cat-btn" onclick="filterCategory('일식')">🍣 일식</button>
      <button class="cat-btn" onclick="filterCategory('중식')">🥢 중식</button>
      <button class="cat-btn" onclick="filterCategory('디저트')">🍰 디저트</button>
      <button class="cat-btn" onclick="filterCategory('베이킹')">🍞 베이킹</button>
      <button class="cat-btn" onclick="filterCategory('음료')">☕ 음료</button>
      <button class="cat-btn" onclick="filterCategory('기타')">📌 기타</button>
    </div>
    <div id="saved-list" class="card"></div>
    <div id="saved-detail" class="hidden" style="margin-top:16px"></div>
  </div>
</div>

<script>
  const SERVER = "https://recipe-app-1wch.onrender.com";
  let imageBase64 = null, imageMime = null;
  let allRecipes = [], currentRecipeIdx = 0;
  let currentUrl = "";
  let loadingTimer = null;

  function switchMainTab(tab) {
    document.querySelectorAll(".tab")[0].classList.toggle("active", tab === "extract");
    document.querySelectorAll(".tab")[1].classList.toggle("active", tab === "saved");
    document.getElementById("main-extract").classList.toggle("hidden", tab !== "extract");
    document.getElementById("main-saved").classList.toggle("hidden", tab !== "saved");
    if (tab === "saved") loadSavedRecipes("전체");
  }

  function switchTab(tab) {
    document.querySelectorAll("#main-extract .tabs .tab").forEach((t, i) => {
      t.classList.toggle("active", (i === 0 && tab === "youtube") || (i === 1 && tab === "image"));
    });
    document.getElementById("tab-youtube").classList.toggle("hidden", tab !== "youtube");
    document.getElementById("tab-image").classList.toggle("hidden", tab !== "image");
    hideError();
  }

  function handleImage(e) {
    const f = e.target.files[0];
    if (!f) return;
    imageMime = f.type || "image/jpeg";
    const reader = new FileReader();
    reader.onload = (ev) => {
      imageBase64 = ev.target.result.split(",")[1];
      const preview = document.getElementById("preview");
      preview.src = ev.target.result;
      preview.classList.remove("hidden");
    };
    reader.readAsDataURL(f);
  }

  function startLoading() {
    document.getElementById("loading-box").classList.remove("hidden");
    document.getElementById("result-section").classList.add("hidden");
    hideError();
    let step = 0;
    [1,2,3,4,5].forEach(i => {
      document.getElementById(`ls${i}`).className = "loading-step";
      document.getElementById(`li${i}`).className = "step-icon";
      document.getElementById(`li${i}`).textContent = i;
    });
    loadingTimer = setInterval(() => {
      if (step > 0) {
        document.getElementById(`ls${step}`).className = "loading-step done";
        document.getElementById(`li${step}`).className = "step-icon done";
        document.getElementById(`li${step}`).textContent = "✓";
      }
      step++;
      if (step <= 5) {
        document.getElementById(`ls${step}`).className = "loading-step active";
        document.getElementById(`li${step}`).className = "step-icon active";
      }
      if (step > 5) clearInterval(loadingTimer);
    }, 1500);
  }

  function stopLoading() {
    clearInterval(loadingTimer);
    document.getElementById("loading-box").classList.add("hidden");
  }

  async function extractYoutube() {
    const url = document.getElementById("youtube-url").value.trim();
    if (!url) return showError("유튜브 URL을 입력해주세요.");
    currentUrl = url;
    hideError(); startLoading();
    try {
      const r = await fetch(`${SERVER}/api/extract`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      const data = await r.json();
      if (data.error) throw new Error(data.error);
      const badge = document.getElementById("method-badge");
      badge.innerHTML = data.method === "gemini_video"
        ? '<span class="method-badge method-gemini">🎬 Gemini 영상 직접 분석</span>'
        : '<span class="method-badge method-transcript">📝 자막 기반 분석</span>';
      showRecipes(data.recipes);
    } catch (e) { showError(e.message); }
    finally { stopLoading(); }
  }

  async function extractImage() {
    if (!imageBase64) return showError("이미지를 업로드해주세요.");
    currentUrl = "";
    hideError(); startLoading();
    try {
      const r = await fetch(`${SERVER}/api/recipe-from-image`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imageBase64, mimeType: imageMime })
      });
      const data = await r.json();
      if (data.error) throw new Error(data.error);
      document.getElementById("method-badge").innerHTML = '<span class="method-badge method-gemini">📸 Gemini 이미지 분석</span>';
      showRecipes(data.recipes);
    } catch (e) { showError(e.message); }
    finally { stopLoading(); }
  }

  function showRecipes(recipes) {
    allRecipes = recipes;
    const tabsEl = document.getElementById("recipe-tabs");
    tabsEl.innerHTML = "";
    if (recipes.length > 1) {
      recipes.forEach((r, i) => {
        const btn = document.createElement("button");
        btn.className = "recipe-tab" + (i === 0 ? " active" : "");
        btn.textContent = r.title || `레시피 ${i+1}`;
        btn.onclick = () => selectRecipe(i);
        tabsEl.appendChild(btn);
      });
    }
    document.getElementById("result-section").classList.remove("hidden");
    selectRecipe(0);
  }

  function selectRecipe(idx) {
    currentRecipeIdx = idx;
    document.querySelectorAll(".recipe-tab").forEach((t, i) => t.classList.toggle("active", i === idx));
    renderRecipe(allRecipes[idx]);
  }

  function renderRecipe(r) {
    document.getElementById("result").innerHTML = `
      <div class="recipe-card">
        <div class="recipe-title">${r.title || ""}</div>
        <div class="recipe-desc">${r.description || ""}</div>
        <div class="meta-grid">
          <div class="meta-item"><div class="meta-label">조리 시간</div><div class="meta-value">${r.time || "-"}</div></div>
          <div class="meta-item"><div class="meta-label">인분</div><div class="meta-value">${r.servings || "-"}</div></div>
        </div>
        ${r.nutrition ? `
        <p class="section-title">예상 영양 정보 (참고용)</p>
        <div class="nutrition-grid">
          <div class="nutrition-item"><div class="nutrition-label">칼로리</div><div class="nutrition-value">${r.nutrition.calories}</div></div>
          <div class="nutrition-item"><div class="nutrition-label">탄수화물</div><div class="nutrition-value">${r.nutrition.carbs}</div></div>
          <div class="nutrition-item"><div class="nutrition-label">단백질</div><div class="nutrition-value">${r.nutrition.protein}</div></div>
          <div class="nutrition-item"><div class="nutrition-label">지방</div><div class="nutrition-value">${r.nutrition.fat}</div></div>
        </div>` : ""}
        <div class="divider"></div>
        <p class="section-title">재료</p>
        <div style="margin-bottom:20px">${(r.ingredients||[]).map(i=>`
          <div class="ingredient-row"><span>${i.name}</span><span class="ingredient-amount">${i.amount}</span></div>
        `).join("")}</div>
        <div class="divider"></div>
        <p class="section-title">조리 방법</p>
        <div>${(r.steps||[]).map((s,i)=>`
          <div class="step-row"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>
        `).join("")}</div>
      </div>`;
  }

 
async function saveRecipe() {
    const recipe = allRecipes[currentRecipeIdx];
    const category = document.getElementById("category-select").value;
    if (!recipe) return;
    const btn = document.querySelector(".save-btn");
    btn.disabled = true;
    btn.textContent = "💾 저장 중...";
    try {
      const r = await fetch(`${SERVER}/api/save-recipe`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recipe, category, source_url: currentUrl })
      });
      const data = await r.json();
      if (data.error) throw new Error(data.error);
      btn.textContent = "✅ 저장됐어요!";
      btn.style.background = "#34a853";
      const el = document.getElementById("save-success");
      el.textContent = `✅ "${recipe.title}" 이(가) ${category}에 저장됐어요!`;
      el.classList.remove("hidden");
      setTimeout(() => {
        el.classList.add("hidden");
        btn.disabled = false;
        btn.textContent = "💾 저장하기";
        btn.style.background = "";
      }, 3000);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "💾 저장하기";
      showError("저장 실패: " + e.message);
    }
  }



  async function loadSavedRecipes(category) {
    document.querySelectorAll(".cat-btn").forEach(b => {
      b.classList.toggle("active", b.textContent.includes(category) || (category === "전체" && b.textContent === "전체"));
    });
    document.getElementById("saved-detail").classList.add("hidden");
    try {
      const r = await fetch(`${SERVER}/api/recipes?category=${category}`);
      const data = await r.json();
      const list = document.getElementById("saved-list");
      if (!data.recipes || data.recipes.length === 0) {
        list.innerHTML = '<p style="color:#888;font-size:14px;text-align:center;padding:20px">저장된 레시피가 없어요 😊</p>';
        return;
      }
      list.innerHTML = data.recipes.map(r => `
        <div class="saved-recipe-item" onclick="showSavedDetail(${JSON.stringify(r).replace(/"/g, '&quot;')})">
          <div>
            <div class="saved-recipe-title">${r.title}</div>
            <div class="saved-recipe-meta">
              <span class="category-badge">${r.category}</span>
              ${r.time || ""} · ${r.servings || ""}
            </div>
          </div>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteRecipe(${r.id})">삭제</button>
        </div>
      `).join("");
    } catch (e) {
      document.getElementById("saved-list").innerHTML = '<p style="color:#c62828;font-size:14px">불러오기 실패</p>';
    }
  }

  function filterCategory(cat) {
    loadSavedRecipes(cat);
  }

  function showSavedDetail(r) {
    const el = document.getElementById("saved-detail");
    el.classList.remove("hidden");
    el.innerHTML = `
      <div class="recipe-card">
        <div class="recipe-title">${r.title}</div>
        <div class="recipe-desc">${r.description || ""}</div>
        <div class="meta-grid">
          <div class="meta-item"><div class="meta-label">조리 시간</div><div class="meta-value">${r.time || "-"}</div></div>
          <div class="meta-item"><div class="meta-label">인분</div><div class="meta-value">${r.servings || "-"}</div></div>
        </div>
        ${r.nutrition ? `
        <p class="section-title">예상 영양 정보 (참고용)</p>
        <div class="nutrition-grid">
          <div class="nutrition-item"><div class="nutrition-label">칼로리</div><div class="nutrition-value">${r.nutrition.calories}</div></div>
          <div class="nutrition-item"><div class="nutrition-label">탄수화물</div><div class="nutrition-value">${r.nutrition.carbs}</div></div>
          <div class="nutrition-item"><div class="nutrition-label">단백질</div><div class="nutrition-value">${r.nutrition.protein}</div></div>
          <div class="nutrition-item"><div class="nutrition-label">지방</div><div class="nutrition-value">${r.nutrition.fat}</div></div>
        </div>` : ""}
        <div class="divider"></div>
        <p class="section-title">재료</p>
        <div style="margin-bottom:20px">${(r.ingredients||[]).map(i=>`
          <div class="ingredient-row"><span>${i.name}</span><span class="ingredient-amount">${i.amount}</span></div>
        `).join("")}</div>
        <div class="divider"></div>
        <p class="section-title">조리 방법</p>
        <div>${(r.steps||[]).map((s,i)=>`
          <div class="step-row"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>
        `).join("")}</div>
      </div>`;
    el.scrollIntoView({ behavior: "smooth" });
  }

  async function deleteRecipe(id) {
    if (!confirm("정말 삭제할까요?")) return;
    try {
      await fetch(`${SERVER}/api/recipes/${id}`, { method: "DELETE" });
      loadSavedRecipes("전체");
    } catch (e) { alert("삭제 실패"); }
  }

  function showError(msg) { const e = document.getElementById("error"); e.textContent = msg; e.classList.remove("hidden"); }
  function hideError() { document.getElementById("error").classList.add("hidden"); }
</script>
</body>
</html>
